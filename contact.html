<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - COCO HOME</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="logo"><span class="logo-text">COCO HOME</span></div>
        <nav class="nav-links">
            <a href="index.html">HOME</a>
            <a href="contact.html" class="active">CONTACT</a>
            <a href="support.html">SUPPORT</a>
            <a href="location.html">LOCATION</a>
            <a href="about.html">ABOUT US</a>
        </nav>
        <button class="btn-buy">Buy Now</button>
    </header>

    <section class="products-section" style="padding-top: 150px;">
        <h2 class="section-heading">CONTACT US</h2>
        <div class="product-card main-card" style="width: 100%; max-width: 600px; margin: 0 auto;">
            <form style="display: flex; flex-direction: column; gap: 20px;">
                <input type="text" placeholder="Your Name" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; color: white;">
                <input type="email" placeholder="Your Email" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; color: white;">
                <textarea placeholder="Your Message" rows="5" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; color: white; resize: none;"></textarea>
                <button class="btn-search" type="submit" style="width: 100%; justify-content: center;">Send Message</button>
            </form>
        </div>
    </section>

    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/07/07/15/20260707152111-B6OKIUZM.js" defer></script>
</body>
</html>
